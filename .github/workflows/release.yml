name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build
        shell: cmd
        run: scripts\build.bat

      - name: Get build info
        id: buildinfo
        shell: pwsh
        run: |
          $short = git rev-parse --short HEAD
          $dt    = (Get-Date -AsUTC).ToString("yyyy.MM.dd_HH.mm.ss")
          $name  = "DesktopBuddy-Alpha-Manager_${dt}_${short}"
          echo "short=$short"  >> $env:GITHUB_OUTPUT
          echo "name=$name"    >> $env:GITHUB_OUTPUT

      - name: Package
        shell: cmd
        env:
          ZIP_NAME: ${{ steps.buildinfo.outputs.name }}
        run: scripts\package.bat

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.buildinfo.outputs.name }}
          name: ${{ steps.buildinfo.outputs.name }}
          body: |
            ## DesktopBuddy Manager

            1. Download `${{ steps.buildinfo.outputs.name }}.exe` below
            2. Run the downloaded manager `.exe` as administrator - it will auto-detect your Resonite install via Steam, or let you browse to it manually
            3. Click **Install / Update** - the manager will copy all files, register the virtual camera driver, and install the virtual audio cable
            4. Restart your PC if prompted - the virtual microphone driver may require a reboot

            The virtual camera appears as **"DesktopBuddy - Camera"** and the virtual microphone as **"CABLE Output"** in Discord, Zoom, Chrome, OBS, etc.

            > Having issues? Use the support report button in the manager, then see the [troubleshooting guide](https://github.com/DevL0rd/DesktopBuddy#troubleshooting) in the README.
          files: ${{ steps.buildinfo.outputs.name }}.exe
