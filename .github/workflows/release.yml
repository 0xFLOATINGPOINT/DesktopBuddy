name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build
        shell: cmd
        run: scripts\build.bat

      - name: Get build info
        id: buildinfo
        shell: pwsh
        run: |
          $short = git rev-parse --short HEAD
          $dt    = (Get-Date -AsUTC).ToString("yyyy.MM.dd_HH.mm.ss")
          $name  = "DesktopBuddy-Alpha-${dt}_${short}"
          echo "short=$short"  >> $env:GITHUB_OUTPUT
          echo "name=$name"    >> $env:GITHUB_OUTPUT

      - name: Package
        shell: cmd
        env:
          ZIP_NAME: ${{ steps.buildinfo.outputs.name }}
        run: scripts\package.bat

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.buildinfo.outputs.name }}
          name: ${{ steps.buildinfo.outputs.name }}
          body: |
            ## DesktopBuddy

            ### Option A — Standalone manager (easiest)

            1. Download `${{ steps.buildinfo.outputs.name }}-DesktopBuddyManager.exe` below
            2. Run it **as administrator** from anywhere — it will detect your Resonite install, download this release's zip, extract all files, and run setup
            3. **Restart your PC** if prompted — the virtual microphone driver may require a reboot

            ### Option B — Manual zip install

            1. Download `${{ steps.buildinfo.outputs.name }}.zip` below
            2. Extract directly into your Resonite root folder (e.g. `C:\Program Files (x86)\Steam\steamapps\common\Resonite\`) — the zip is already structured to match
            3. Run `DesktopBuddyManager.exe` **as administrator** from the Resonite root to register the virtual camera, install the virtual microphone driver, and install renderer dependencies
            4. **Restart your PC** if prompted

            ---
            Already have the manager? Just click **Install / Update** — it will download this zip automatically.

            The virtual camera appears as **"DesktopBuddy - Camera"** and the virtual microphone as **"CABLE Output"** in Discord, Zoom, Chrome, OBS, etc.

            > Having issues? Use the support report button in the manager, then see the [troubleshooting guide](https://github.com/DevL0rd/DesktopBuddy#troubleshooting) in the README.
          files: |
            ${{ steps.buildinfo.outputs.name }}.zip
            ${{ steps.buildinfo.outputs.name }}-DesktopBuddyManager.exe
